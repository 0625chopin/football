name: Secret Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gitleaks:
    name: Secret scan (commit history 포함)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks detect는 기본적으로 git log 전체를 스캔한다(커밋 히스토리 포함).
          # actions/checkout 기본값(fetch-depth: 1)은 최신 커밋만 받아 과거 커밋에 섞여
          # 들어간 시크릿을 놓치므로 전체 히스토리를 받는다.
          fetch-depth: 0

      # gitleaks/gitleaks-action(마켓플레이스 액션) v2부터는 조직 사용 시 GITLEAKS_LICENSE가
      # 필요하다. 스캐너 본체인 gitleaks CLI는 MIT 라이선스로 별도 키 없이 그대로 쓸 수 있어
      # 릴리스 바이너리를 직접 받아 실행한다(라이선스 의존성 회피).
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.30.1"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Run gitleaks
        run: ./gitleaks detect --source . --log-opts="--all" --redact --exit-code 1

  client-bundle-service-role-key:
    name: 클라이언트 번들 서비스롤 키 grep 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # 주의: WSL 마운트(/mnt/...)에서는 next build 마지막 copyfile 단계가 EPERM으로
      # 실패한다(I-62, CLAUDE.md). 이 워크플로우는 GitHub-hosted ubuntu-latest 러너
      # (ext4)에서만 돌아 WSL 문제와 무관하며, 정적 청크(.next/static)는 실패 지점 이전에
      # 이미 전부 생성되므로 로컬에서도 grep 로직 자체는 확인했다. 여기서는 러너 환경상
      # 빌드가 끝까지 성공하는 것을 전제로 build를 게이트로 둔다.
      - run: npm run build

      # SUPABASE_SERVICE_ROLE_KEY는 NEXT_PUBLIC_ 접두사가 없어 정상적으로는 클라이언트
      # 번들에 인라인되지 않는다(Next.js가 NEXT_PUBLIC_*만 클라이언트로 노출). 이 검사는
      # 실수로 NEXT_PUBLIC_ 접두사를 붙이거나 값을 하드코딩하는 회귀를 잡는 방어용이다.
      - name: grep client bundle for service-role key leakage
        run: |
          set -euo pipefail
          if grep -rIlE 'SUPABASE_SERVICE_ROLE_KEY|service_role' .next/static; then
            echo "::error::서비스 롤 키 관련 문자열이 클라이언트 번들(.next/static)에서 발견됐습니다."
            exit 1
          fi
          echo "클라이언트 번들 서비스롤 키 검사 통과 (0건)"
